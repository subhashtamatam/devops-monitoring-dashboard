groups:
  - name: flask_app_alerts
    rules:

      # ── Alert 1: App is completely down ──
      - alert: AppDown
        expr: up{job="flask-app"} == 0
        for: 15s
        labels:
          severity: critical
        annotations:
          summary: "Flask application is DOWN"
          description: "The Flask app on localhost:5000 has been unreachable for more than 15 seconds."

      # ── Alert 2: High CPU usage ──
      - alert: HighCPUUsage
        expr: rate(process_cpu_seconds_total{job="flask-app"}[1m]) * 100 > 70
        for: 30s
        labels:
          severity: warning
        annotations:
          summary: "High CPU usage detected"
          description: "CPU usage has been above 70% for more than 30 seconds."

      # ── Alert 3: High response latency ──
      - alert: HighResponseLatency
        expr: >
          rate(http_request_duration_seconds_sum{job="flask-app"}[1m])
          /
          rate(http_request_duration_seconds_count{job="flask-app"}[1m])
          > 0.5
        for: 30s
        labels:
          severity: warning
        annotations:
          summary: "High response latency detected"
          description: "Average response time has exceeded 500ms for more than 30 seconds."

      # ── Alert 4: High error rate ──
      - alert: HighErrorRate
        expr: rate(app_errors_total{job="flask-app"}[1m]) > 0.05
        for: 20s
        labels:
          severity: critical
        annotations:
          summary: "High error rate detected"
          description: "Error rate has exceeded 0.05 errors/sec for more than 20 seconds."

      # ── Alert 5: High request rate (traffic spike) ──
      - alert: TrafficSpike
        expr: rate(app_requests_total{job="flask-app"}[1m]) > 0.5
        for: 20s
        labels:
          severity: warning
        annotations:
          summary: "Traffic spike detected"
          description: "Request rate has exceeded 0.5 req/sec for more than 20 seconds."
