# nginx.conf
# Nginx Load Balancer Configuration
# Real-Time Application Performance Monitoring Dashboard
# PG Final Year Major Project
#
# Routes incoming traffic on port 8080 between:
#   Primary:  Flask app on localhost:5000
#   Backup:   Flask app on localhost:5002
#
# Strategy: Round Robin with automatic failover
# If primary goes down → all traffic goes to backup automatically

events {
    worker_connections 1024;
}

http {

    # ── Upstream block: defines the server pool ──
    upstream flask_servers {
	
	least_conn;
        
        server localhost:5000 weight=3 max_fails=3 fail_timeout=10s;
        server localhost:5002 weight=1 max_fails=3 fail_timeout=10s;

        # Health check interval
        keepalive 32;
    }

    # ── Main server block: listens on port 8080 ──
    server {
        listen 8080;
        server_name localhost;

        # Access log
        access_log /var/log/nginx/devops_monitor_access.log;
        error_log  /var/log/nginx/devops_monitor_error.log;

        # ── Proxy all requests to the upstream pool ──
        location / {
            proxy_pass         http://flask_servers;
            proxy_http_version 1.1;

            # Pass real client info to Flask
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Server-Port     $server_port;

            # Timeout settings
            proxy_connect_timeout  5s;
            proxy_read_timeout     30s;
            proxy_send_timeout     30s;

            # If primary fails, try backup
            proxy_next_upstream    error timeout http_502 http_503 http_504;
            proxy_next_upstream_tries 2;
        }

        # ── Health check endpoint for Nginx itself ──
        location /nginx-health {
            return 200 'Nginx Load Balancer Running on port 8080\n';
            add_header Content-Type text/plain;
        }

        # ── Show upstream status ──
        location /nginx-status {
            stub_status on;
            allow all;
        }
    }
}
