groups:
  - name: flask_app_alerts
    rules:

      - alert: AppDown
        expr: up{job="flask-app"} == 0
        for: 15s
        labels:
          severity: critical
        annotations:
          summary: "Flask application is DOWN"
          description: "Flask app on localhost:5000 unreachable for more than 15 seconds."

      - alert: HighCPUUsage
        expr: rate(process_cpu_seconds_total{job="flask-app"}[2m]) * 100 > 70
        for: 30s
        labels:
          severity: warning
        annotations:
          summary: "High CPU usage detected"
          description: "CPU usage above 70% for more than 30 seconds."

      - alert: HighResponseLatency
        expr: >
          rate(http_request_duration_seconds_sum{job="flask-app"}[2m])
          /
          rate(http_request_duration_seconds_count{job="flask-app"}[2m])
          > 0.5
        for: 30s
        labels:
          severity: warning
        annotations:
          summary: "High response latency detected"
          description: "Average response time exceeded 500ms for more than 30 seconds."

      - alert: HighErrorRate
        expr: rate(app_errors_total{job="flask-app"}[2m]) > 0.05
        for: 20s
        labels:
          severity: critical
        annotations:
          summary: "High error rate detected"
          description: "Error rate exceeded 0.05 errors/sec for more than 20 seconds."

      - alert: TrafficSpike
        expr: rate(app_requests_total{job="flask-app"}[2m]) > 0.5
        for: 20s
        labels:
          severity: warning
        annotations:
          summary: "Traffic spike detected"
          description: "Request rate exceeded 0.5 req/sec for more than 20 seconds."
