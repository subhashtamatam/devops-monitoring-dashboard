global:
  scrape_interval: 2s
  evaluation_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - localhost:9093

rule_files:
  - "alert.rules.yml"

scrape_configs:
  - job_name: 'flask-app'
    static_configs:
      - targets: ['localhost:5000']

  - job_name: 'flask-app-backup'
    static_configs:
      - targets: ['localhost:5002']
